name: Nike Running Monitor

on:
  schedule:
    - cron: "*/30 * * * *"   # Every 30 minutes, 24/7
  workflow_dispatch:           # Manual trigger (useful for testing)

permissions:
  contents: write              # Needed to commit the state file back

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser (Chromium)
        run: playwright install chromium --with-deps

      - name: Run Nike monitor
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scraper.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notified_events.json
          git diff --staged --quiet || git commit -m "chore: update notified events state [skip ci]"
          git push
